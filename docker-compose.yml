services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_NAME: Zentiti Backend API
      API_PREFIX: /api
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: zentiti
      CORS_ORIGINS: http://localhost
      FORCE_HTTPS: "false"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      RATE_LIMIT_MAX_REQUESTS: "30"
    depends_on:
      - mongo
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo_data:
